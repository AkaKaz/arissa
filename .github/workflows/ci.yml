name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # version.mk uses `git describe --tags`, so we need tags.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dpkg-dev
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends dpkg-dev

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Package (.deb)
        run: make deb

      - name: Smoke test (exit 0 on missing config)
        # The service should exit cleanly when required config is
        # absent, so systemd does not restart-loop on unconfigured
        # hosts. Run the compiled binary with a non-existent config
        # path and assert exit code 0.
        env:
          ARISSA_CONFIG: /nonexistent/config.toml
        run: ./bin/arissa

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: arissa-bin
          path: bin/arissa
          if-no-files-found: error

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: arissa-deb
          path: dist/arissa.deb
          if-no-files-found: error

  arch-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install toolchain
        run: |
          pacman -Sy --noconfirm --needed go git sudo

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust workspace (git safe.directory)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Create build user
        # makepkg refuses to run as root.
        run: |
          useradd -m builder
          chown -R builder:builder .

      - name: Build binary
        run: sudo -u builder make build

      - name: Package (Arch)
        run: sudo -u builder make arch

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: arissa-archpkg
          path: dist/arissa-*-x86_64.pkg.tar.zst
          if-no-files-found: error

  arch-install-test:
    needs: arch-build
    runs-on: ubuntu-latest
    steps:
      - name: Download Arch package artifact
        uses: actions/download-artifact@v4
        with:
          name: arissa-archpkg
          path: ./artifact

      - name: Install into archlinux and verify
        run: |
          docker run --rm \
            -v "$PWD/artifact:/artifact:ro" \
            archlinux:base \
            bash -c '
              set -euo pipefail
              pacman -Sy --noconfirm --needed systemd ca-certificates
              pacman -U --noconfirm /artifact/arissa-*-x86_64.pkg.tar.zst
              getent passwd arissa
              test -x /usr/bin/arissa
              test -d /etc/arissa/context
              test -d /etc/arissa/skills
              test -d /var/lib/arissa
              test -f /etc/arissa/config.toml
              test -f /etc/arissa/system.prompt.md
              systemd-analyze verify /usr/lib/systemd/system/arissa.service
              /usr/bin/arissa
            '

  deb-install-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: arissa-deb
          path: ./artifact

      - name: Install into debian:trixie and verify
        run: |
          docker run --rm \
            -v "$PWD/artifact:/artifact:ro" \
            debian:trixie \
            bash -c '
              set -euo pipefail
              apt-get update -qq
              apt-get install -y --no-install-recommends systemd ca-certificates
              dpkg -i /artifact/arissa.deb
              getent passwd arissa
              test -x /usr/bin/arissa
              test -d /etc/arissa/context
              test -d /etc/arissa/skills
              test -d /var/lib/arissa
              test -f /etc/arissa/config.toml
              test -f /etc/arissa/system.prompt.md
              systemd-analyze verify /usr/lib/systemd/system/arissa.service
              /usr/bin/arissa
            '
