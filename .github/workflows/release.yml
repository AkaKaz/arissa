name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # version.mk uses `git describe --tags`, so we need tags.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dpkg-dev
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends dpkg-dev

      - name: Build
        run: make build

      - name: Package (.deb)
        run: make deb

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/arissa
            dist/arissa.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
