name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # version.mk uses `git describe --tags`, so we need tags.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dpkg-dev
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends dpkg-dev

      - name: Build
        run: make build

      - name: Package (.deb)
        run: make deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-deb
          path: |
            bin/arissa
            dist/arissa.deb
          if-no-files-found: error

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install toolchain
        run: pacman -Sy --noconfirm --needed go git sudo

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust workspace (git safe.directory)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Create build user
        run: |
          useradd -m builder
          chown -R builder:builder .

      - name: Build binary
        run: sudo -u builder make build

      - name: Package (Arch)
        run: sudo -u builder make arch

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-arch
          path: dist/arissa-*-x86_64.pkg.tar.zst
          if-no-files-found: error

  release:
    needs: [build-deb, build-arch]
    runs-on: ubuntu-latest
    steps:
      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: release-deb
          path: ./release

      - name: Download arch artifact
        uses: actions/download-artifact@v4
        with:
          name: release-arch
          path: ./release/dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/bin/arissa
            release/dist/arissa.deb
            release/dist/arissa-*-x86_64.pkg.tar.zst
          generate_release_notes: true
          fail_on_unmatched_files: true
